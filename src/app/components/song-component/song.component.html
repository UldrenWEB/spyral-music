<ion-header>
    <ion-toolbar>
      <ion-title>Reproduciendo Ahora</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
    <ion-grid>
      <ion-row>
        <ion-col size="8" (click)="navigateToSongView()">
          <div>
            <h3>{{ currentSong.title }}</h3>
            <p>{{ currentSong.artist }}</p>
          </div>
        </ion-col>
        <ion-col size="4">
          <ion-buttons>
            <ion-button (click)="playOrPause()">
              <ion-icon name="play-outline" *ngIf="!isPlaying"></ion-icon>
              <ion-icon name="pause-outline" *ngIf="isPlaying"></ion-icon>
            </ion-button>
            <ion-button (click)="playNext()">
              <ion-icon name="play-forward-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-col>
      </ion-row>
    </ion-grid>
</ion-content>
